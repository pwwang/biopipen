name: docker

on: [push]

jobs:

  docker-base:
    runs-on: ubuntu-latest
    steps:
      - name: Delete cache to save space
        # https://github.com/orgs/community/discussions/25678#discussioncomment-5242449
        run: rm -rf /opt/hostedtoolcache
      - uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          file: docker/base/Dockerfile
          tags: biopipen/base:latest

  docker-test-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Delete cache to save space
        # https://github.com/orgs/community/discussions/25678#discussioncomment-5242449
        run: rm -rf /opt/hostedtoolcache
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Check if env/docker files changed
        id: check_changes
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if [[ "${{ github.ref_name }}" == "dev" ]] && (git diff --name-only HEAD~1 HEAD | grep -qE '(cleanup\.list|env_biopipen\.yml|Dockerfile\.deps)$' || echo "$COMMIT_MSG" | grep -qi 'force docker-test-deps'); then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Set up QEMU
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Build and push
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          file: docker/test/Dockerfile.deps
          tags: biopipen/test-deps:latest

  docker-test:
    needs: docker-test-deps
    runs-on: ubuntu-latest
    steps:
      - name: Delete cache to save space
        # https://github.com/orgs/community/discussions/25678#discussioncomment-5242449
        run: rm -rf /opt/hostedtoolcache
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Check for changes
        id: check_changes
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if git diff --name-only HEAD^ HEAD | grep -iq 'docker/test' || echo "$COMMIT_MSG" | grep -qi 'force docker-test'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Set up QEMU
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Build and push
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          file: docker/test/Dockerfile
          tags: biopipen/test:latest

  docker-cnvkit-pipeline:
    needs: docker-test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Delete cache to save space
        # https://github.com/orgs/community/discussions/25678#discussioncomment-5242449
        run: rm -rf /opt/hostedtoolcache
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Check for changes
        id: check_changes
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if [ "${{ needs.docker-test.result }}" == "success" ] && (git diff --name-only HEAD^ HEAD | grep -iq 'cnvkit' || echo "$COMMIT_MSG" | grep -qi 'force docker-cnvkit-pipeline'); then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Set up QEMU
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Build and push
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          file: docker/cnvkit_pipeline/Dockerfile
          tags: biopipen/cnvkit-pipeline:${{ github.ref_name }}

  docker-cellranger-pipeline:
    needs: docker-test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Delete cache to save space
        # https://github.com/orgs/community/discussions/25678#discussioncomment-5242449
        run: rm -rf /opt/hostedtoolcache
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Check for changes
        id: check_changes
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if [ "${{ needs.docker-test.result }}" == "success" ] && (git diff --name-only HEAD^ HEAD | grep -iq 'cellranger' || echo "$COMMIT_MSG" | grep -qi 'force docker-cellranger-pipeline'); then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Set up QEMU
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Build and push
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          file: docker/cellranger_pipeline/Dockerfile
          tags: biopipen/cellranger-pipeline:${{ github.ref_name }}

  docker-pipseeker-pipeline:
    needs: docker-test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Delete cache to save space
        # https://github.com/orgs/community/discussions/25678#discussioncomment-5242449
        run: rm -rf /opt/hostedtoolcache
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Check for changes
        id: check_changes
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if [ "${{ needs.docker-test.result }}" == "success" ] && (git diff --name-only HEAD^ HEAD | grep -iq 'pipseeker' || echo "$COMMIT_MSG" | grep -qi 'force docker-pipseeker-pipeline'); then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Set up QEMU
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Build and push
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          file: docker/pipseeker_pipeline/Dockerfile
          tags: biopipen/pipseeker-pipeline:${{ github.ref_name }}
