name: Docs

on:
  push:
    paths:
      - .github/workflows/docs.yml
      - docs/**
      - mkdocs.yml
      - pyproject.toml
      - 'biopipen/ns/*.py'
      - 'biopipen/core/*.py'
      - 'biopipen/utils/*.py'

jobs:
  docs:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'Merge branch ''master'' into') && !contains(github.event.head_commit.message, '[wip]')"
    # if: github.ref == 'refs/heads/master'
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install dependencies
        run: |
          uv sync --group docs
      - name: Build docs
        run: |
          cp README.md docs/index.md
          uv run mkdocs build
        if : success()
      - name: Deploy docs
        run: |
          uv run mkdocs gh-deploy --clean --force
        # if: success() && github.ref == 'refs/heads/master'
